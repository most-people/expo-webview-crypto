<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <script>
      window.addEventListener("message", async (event) => {
        const { id, method, args } = event.data;
        try {
          const result = await crypto.subtle[method](...args);
          window.ReactNativeWebView.postMessage(JSON.stringify({ id, result }));
        } catch (error) {
          window.ReactNativeWebView.postMessage(JSON.stringify({ id, error }));
        }
      });
    </script>
  </head>
</html>
